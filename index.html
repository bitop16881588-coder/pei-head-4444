<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>頭腦備份站</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  /* 可愛圓體（jf-openhuninn），載入失敗會自動退回 Noto Sans TC */
  @font-face{
    font-family:"jf-openhuninn";
    src:url("https://cdn.jsdelivr.net/gh/justfont/open-huninn-font@master/font/jf-openhuninn-2.0.ttf") format("truetype");
    font-display:swap;
  }
  :root{
    --paper:#fff4ef;
    --card:#ffffff;
    --ink:#5b4a44;
    --ink-soft:#b09a92;
    --line:#ffe5dc;
    --accent:#ff8c7a;
    --accent-2:#7ecbc0;
    --accent-soft:#ffe7e1;
    --danger:#ef6b6b;
    --shadow:0 2px 4px rgba(214,150,135,.10),0 10px 22px rgba(214,150,135,.14);
    --radius:20px;
    --round:"jf-openhuninn","Noto Sans TC",system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:"Noto Sans TC",system-ui,-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;
    background:
      radial-gradient(circle at 12% -5%, #ffe1d6 0, transparent 42%),
      radial-gradient(circle at 92% 4%, #d8f3ee 0, transparent 38%),
      var(--paper);
    background-attachment:fixed;
    color:var(--ink);
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .wrap{max-width:1200px;margin:0 auto;padding:20px 12px 80px}

  /* header */
  header.app{display:flex;align-items:center;gap:13px;margin-bottom:22px}
  .mark{
    width:48px;height:48px;border-radius:16px;flex:0 0 auto;
    background:linear-gradient(140deg,#ffb3a0,#ff8c7a);
    box-shadow:0 6px 14px rgba(255,140,122,.4),inset 0 -3px 6px rgba(0,0,0,.06);
    display:grid;place-items:center;font-size:25px;line-height:1;
    transform-origin:50% 60%;animation:bob 3.4s ease-in-out infinite;
  }
  .mark svg{width:34px;height:34px;display:block}
  .mark .eye{transform-box:fill-box;transform-origin:center}
  .mark.blink .eye{animation:blink .42s ease}
  @keyframes blink{0%,100%{transform:scaleY(1)}40%,60%{transform:scaleY(.12)}}
  @keyframes bob{0%,100%{transform:rotate(-5deg) translateY(0)}50%{transform:rotate(5deg) translateY(-3px)}}
  .title-block h1{
    font-family:var(--round);font-size:24px;margin:0;font-weight:700;letter-spacing:1px;color:#ff7a66;
  }
  .title-block p{margin:2px 0 0;font-size:13px;color:var(--ink-soft);font-family:var(--round)}
  .spacer{flex:1}
  .ghost-btn{
    border:2px solid var(--line);background:var(--card);color:var(--ink-soft);
    font:inherit;font-size:13px;padding:7px 13px;border-radius:14px;cursor:pointer;font-weight:500;
    transition:.14s;
  }
  .ghost-btn:hover{color:var(--accent);border-color:var(--accent);transform:translateY(-1px)}

  /* bookmark bar of topics */
  .bookmark-bar{
    display:flex;flex-wrap:wrap;gap:7px;
    background:var(--card);border:2px solid var(--line);border-radius:22px;
    padding:11px;box-shadow:var(--shadow);
  }
  .bm{
    position:relative;display:flex;align-items:center;gap:9px;
    padding:8px 14px 8px 9px;border-radius:15px;cursor:pointer;
    background:transparent;border:none;font:inherit;color:var(--ink);text-align:left;
    max-width:200px;transition:transform .14s,background .14s;
  }
  .bm:hover{background:var(--accent-soft);transform:translateY(-2px) scale(1.03)}
  .bm:active{transform:scale(.96)}
  .bm.sel{background:var(--accent-soft);box-shadow:inset 0 0 0 2px var(--accent)}
  .bm .ic{
    width:30px;height:30px;border-radius:11px;flex:0 0 auto;display:grid;place-items:center;
    font-size:17px;line-height:1;background:var(--tag,#ffe0d8);
    box-shadow:inset 0 -2px 4px rgba(0,0,0,.04);
  }
  .bm .lbl{font-size:14.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bm .badge{
    flex:0 0 auto;min-width:19px;height:19px;padding:0 5px;border-radius:10px;
    background:var(--accent);color:#fff;font-size:11px;font-weight:700;
    display:grid;place-items:center;box-shadow:0 2px 5px rgba(255,140,122,.45);
  }
  .bm-add{
    display:flex;align-items:center;gap:6px;padding:8px 15px;border-radius:15px;cursor:pointer;
    background:transparent;border:2px dashed #ffc9bb;color:var(--accent);
    font:inherit;font-size:14px;font-weight:500;transition:.14s;
  }
  .bm-add:hover{background:var(--accent-soft);transform:translateY(-2px)}
  .bm-add .plus{font-size:18px;line-height:1}

  .empty{
    text-align:center;color:var(--ink-soft);padding:44px 20px;border:2px dashed var(--line);
    border-radius:var(--radius);background:rgba(255,255,255,.5)
  }
  .empty .face{font-size:38px;display:block;margin-bottom:8px}
  .empty strong{display:block;color:var(--accent);font-size:16px;margin-bottom:4px;font-family:var(--round)}

  /* inline content panel */
  .panel{margin-top:18px;animation:fadein .22s ease}
  @keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .panel-head{display:flex;align-items:center;gap:10px;margin:2px 2px 14px}
  .panel-head h2{margin:0;font-size:20px;font-weight:700;font-family:var(--round);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bigdot{width:36px;height:36px;border-radius:13px;flex:0 0 auto;display:grid;place-items:center;font-size:19px;line-height:1;box-shadow:inset 0 -2px 4px rgba(0,0,0,.04)}

  .item{
    background:var(--card);border:2px solid var(--line);border-radius:18px;
    padding:14px 15px;margin-bottom:11px;display:flex;gap:12px;align-items:flex-start;
    box-shadow:var(--shadow);transition:transform .12s;
  }
  .item:hover{transform:translateY(-1px)}
  .check{
    width:24px;height:24px;border-radius:9px;border:2.5px solid #ffcdc0;flex:0 0 auto;margin-top:1px;
    cursor:pointer;display:grid;place-items:center;background:#fff;transition:.15s;
  }
  .check.on{background:var(--accent);border-color:var(--accent);animation:pop .28s ease}
  @keyframes pop{0%{transform:scale(.7)}55%{transform:scale(1.18)}100%{transform:scale(1)}}
  .check svg{width:14px;height:14px;stroke:#fff;stroke-width:3.4;fill:none;opacity:0;transition:.12s}
  .check.on svg{opacity:1}
  .item-body{flex:1;min-width:0}
  .item-title{font-weight:500;font-size:15.5px;word-break:break-word}
  .item.done .item-title{color:var(--ink-soft);text-decoration:line-through}
  .item-note{font-size:13px;color:var(--ink-soft);margin-top:3px;white-space:pre-wrap;word-break:break-word}
  .item-actions{display:flex;gap:4px;flex:0 0 auto}
  .icon-btn{
    border:none;background:transparent;cursor:pointer;color:#cdb8b0;font-size:13px;
    padding:6px 9px;border-radius:11px;font-family:inherit;font-weight:500;transition:.12s;
  }
  .icon-btn:hover{background:var(--accent-soft);color:var(--accent)}
  .icon-btn.del:hover{background:#ffe2e2;color:var(--danger)}
  .icon-btn.confirm{background:var(--danger);color:#fff}
  .icon-btn.confirm:hover{background:#dc5757;color:#fff}

  .add-item-bar{
    display:flex;gap:9px;margin-top:6px;background:var(--card);border:2px solid var(--line);
    border-radius:18px;padding:9px;box-shadow:var(--shadow);align-items:center;
  }
  .attach-btn{
    flex:0 0 auto;width:38px;height:38px;border-radius:13px;border:2px solid var(--line);
    background:#fff;cursor:pointer;font-size:18px;line-height:1;transition:.14s;
  }
  .attach-btn:hover{border-color:var(--accent);background:var(--accent-soft);transform:translateY(-1px)}
  .add-item-bar input{
    flex:1;border:none;background:transparent;font:inherit;font-size:15px;color:var(--ink);
    padding:6px 9px;outline:none;min-width:0;
  }

  /* file item bits */
  .fic{
    width:38px;height:38px;border-radius:11px;flex:0 0 auto;display:grid;place-items:center;
    font-size:19px;line-height:1;background:var(--accent-soft);overflow:hidden;
  }
  .fic img{width:100%;height:100%;object-fit:cover}
  .item-size{font-size:12.5px;color:var(--ink-soft);margin-top:2px}

  /* linked google sheet */
  .sheet-block{
    background:var(--card);border:2px solid var(--line);border-radius:18px;
    padding:12px 13px;margin-bottom:12px;box-shadow:var(--shadow);
  }
  .sheet-bar{display:flex;align-items:center;gap:9px;margin-bottom:10px}
  .sheet-title{font-weight:700;font-size:14.5px;font-family:var(--round);color:var(--accent)}
  .sheet-meta{font-size:12px;color:var(--ink-soft);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mini-btn{
    border:2px solid var(--line);background:#fff;color:var(--accent);font:inherit;font-size:12.5px;font-weight:500;
    padding:5px 11px;border-radius:11px;cursor:pointer;flex:0 0 auto;transition:.12s;
  }
  .mini-btn:hover{border-color:var(--accent);background:var(--accent-soft)}
  .mini-btn:disabled{opacity:.6;cursor:default}
  .sheet-search{display:flex;align-items:center;gap:8px;margin:0 0 9px;
    border:2px solid var(--line);border-radius:12px;padding:4px 10px;background:#fff}
  .sheet-search .ss-ic{font-size:14px;opacity:.7}
  .sheet-search input{flex:1;border:none;outline:none;background:transparent;font:inherit;font-size:14px;color:var(--ink);padding:6px 2px}
  .sheet-search .ss-clear{border:none;background:transparent;cursor:pointer;color:var(--ink-soft);font-size:13px;padding:4px 6px;border-radius:8px}
  .sheet-search .ss-clear:hover{background:var(--accent-soft);color:var(--accent)}
  .sheet-scroll{overflow-x:auto;border-radius:12px;border:1px solid var(--line)}
  table.sheet-tbl{border-collapse:collapse;width:100%;font-size:17px}
  table.sheet-tbl th,table.sheet-tbl td{
    border:1px solid #d9d2c6;padding:11px 14px;text-align:center;white-space:nowrap;
  }
  table.sheet-tbl thead th{background:var(--accent-soft);color:var(--ink);position:sticky;top:0;z-index:2;font-family:var(--round);font-size:16px;font-weight:700;box-shadow:0 1px 0 #d9d2c6}
  table.sheet-tbl thead th.g-in{background:#d9ead3;color:#274e13}
  table.sheet-tbl thead th.g-out{background:#cfe2e6;color:#0c343d}
  table.sheet-tbl tbody tr:nth-child(even){background:#fff8f5}
  td.amt{font-variant-numeric:tabular-nums;font-weight:600}
  .st-yes{display:inline-block;min-width:1.5em;padding:.08em .45em;border-radius:.55em;background:#dcefe0;color:#1f7a3a;font-weight:700}
  .st-no{display:inline-block;min-width:1.5em;padding:.08em .45em;border-radius:.55em;background:#f6e0db;color:#c0492f;font-weight:700}
  td.amt span{margin-right:4px}
  .copy-btn{
    border:none;background:transparent;cursor:pointer;font-size:14px;line-height:1;
    padding:3px 5px;border-radius:8px;opacity:.5;vertical-align:middle;transition:.12s;
  }
  .copy-btn:hover{opacity:1;background:var(--accent-soft)}
  .copy-btn.copied{opacity:1;color:var(--accent);font-weight:700}
  .sheet-err{color:var(--danger);font-size:13px;padding:6px 2px;line-height:1.5}
  .sheet-empty{color:var(--ink-soft);font-size:13px;padding:8px 2px}
  .sheet-more{font-size:12px;color:var(--ink-soft);padding:6px 2px 0}
  .pill-btn{
    border:none;background:var(--accent);color:#fff;font:inherit;font-weight:700;font-size:14px;
    padding:9px 18px;border-radius:14px;cursor:pointer;flex:0 0 auto;
    box-shadow:0 4px 10px rgba(255,140,122,.4);transition:.14s;
  }
  .pill-btn:hover{background:#ff7a66;transform:translateY(-1px)}
  .pill-btn:active{transform:scale(.96)}
  .pill-btn:disabled{background:#ffd9d0;box-shadow:none;cursor:default;transform:none}

  /* modal */
  .overlay{
    position:fixed;inset:0;background:rgba(91,74,68,.32);display:none;align-items:flex-end;
    justify-content:center;z-index:50;padding:0;backdrop-filter:blur(2px);
  }
  .overlay.show{display:flex}
  .sheet{
    background:var(--paper);width:100%;max-width:480px;border-radius:26px 26px 0 0;
    padding:22px 20px calc(22px + env(safe-area-inset-bottom));box-shadow:0 -10px 40px rgba(91,74,68,.2);
    animation:rise .22s ease;
  }
  @keyframes rise{from{transform:translateY(18px);opacity:.6}to{transform:translateY(0);opacity:1}}
  .sheet h3{margin:0 0 16px;font-size:18px;font-family:var(--round);color:var(--accent)}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12.5px;color:var(--ink-soft);margin-bottom:6px}
  .field input,.field textarea{
    width:100%;border:2px solid var(--line);background:var(--card);border-radius:14px;
    font:inherit;font-size:15px;color:var(--ink);padding:11px 13px;outline:none;resize:vertical;transition:.14s;
  }
  .field input:focus,.field textarea:focus{border-color:var(--accent)}
  .swatches{display:flex;gap:11px;flex-wrap:wrap}
  .swatch{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:.14s}
  .swatch:hover{transform:scale(1.1)}
  .swatch.sel{border-color:var(--accent);transform:scale(1.15)}
  .icon-grid{display:flex;flex-wrap:wrap;gap:8px}
  .icon-pick{
    width:42px;height:42px;border-radius:14px;border:2px solid var(--line);background:var(--card);
    display:grid;place-items:center;font-size:20px;cursor:pointer;transition:.14s;line-height:1;
  }
  .icon-pick:hover{border-color:var(--accent);transform:translateY(-2px)}
  .icon-pick.sel{border-color:var(--accent);background:var(--accent-soft);transform:scale(1.05)}
  .sheet-actions{display:flex;gap:10px;margin-top:8px}
  .sheet-actions .pill-btn{flex:1;padding:13px}
  .sheet-actions .ghost-btn{flex:0 0 auto;padding:13px 18px;border-radius:14px}
  .del-topic{
    margin-top:14px;text-align:center;
  }
  .del-topic button{
    border:none;background:transparent;color:var(--danger);font:inherit;font-size:13.5px;cursor:pointer;
    padding:9px 16px;border-radius:13px;transition:.12s;
  }
  .del-topic button:hover{background:#ffe2e2}
  .del-topic button.confirm{background:var(--danger);color:#fff}

  .hidden{display:none!important}

  /* 小計算機（右側浮動、可拖移、可放大縮小、不擋畫面） */
  .calc-panel{
    position:fixed; right:14px; top:84px; z-index:200;
    width:17em; font-size:13px;
    background:var(--paper); border:2px solid var(--line); border-radius:1.2em;
    box-shadow:0 12px 40px rgba(91,74,68,.28); padding:.7em;
    user-select:none; touch-action:none;
  }
  .calc-bar{display:flex;align-items:center;gap:.3em;margin-bottom:.5em;cursor:move}
  .calc-grip{flex:1;font-weight:700;font-size:1em;font-family:var(--round);color:var(--accent);white-space:nowrap;display:flex;align-items:center;gap:.35em}
  .calc-grip svg{width:1.2em;height:1.2em}
  .calc-mini{
    border:none;background:#f3ece2;color:var(--ink-soft);font:inherit;font-size:.85em;font-weight:700;
    padding:.35em .6em;border-radius:.6em;cursor:pointer;line-height:1;
  }
  .calc-mini:hover{background:var(--accent-soft);color:var(--accent)}
  .calc-display{
    background:#fff;border:2px solid var(--line);border-radius:.9em;padding:.5em .7em;margin-bottom:.55em;
    text-align:right;min-height:3em;display:flex;flex-direction:column;justify-content:center;
  }
  .calc-expr{font-size:.85em;color:var(--ink-soft);min-height:1.1em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .calc-now{font-size:1.9em;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.45em}
  .calc-key{
    border:none;border-radius:.7em;padding:.7em 0;font:inherit;font-size:1.15em;font-weight:600;cursor:pointer;
    background:#fff;color:var(--ink);box-shadow:var(--shadow);transition:transform .08s,background .12s;
  }
  .calc-key:active{transform:scale(.94)}
  .calc-key.fn{background:#f3ece2;color:var(--ink-soft)}
  .calc-key.op{background:var(--accent-soft);color:var(--accent)}
  .calc-key.eq{background:var(--accent);color:#fff;box-shadow:0 4px 10px rgba(255,140,122,.4)}
  .calc-key.copy{background:#e3f0ed;color:#1f7a6d}
  .calc-key.copy.copied{background:var(--accent);color:#fff}
  .calc-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:.45em;margin-top:.5em}
  .calc-note-row{display:flex;gap:.4em;align-items:center;margin-top:.55em}
  .calc-note{
    flex:1;border:2px solid var(--line);border-radius:.7em;
    font:inherit;font-size:.95em;color:var(--ink);padding:.55em .7em;outline:none;background:#fff;min-width:0;
  }
  .calc-note:focus{border-color:var(--accent)}
  .note-hide{border:none;background:#f3ece2;color:var(--ink-soft);border-radius:.6em;padding:.55em .65em;cursor:pointer;font-size:.85em;line-height:1}
  .note-hide:hover{background:#ffe2e2;color:var(--danger)}
  .note-show{
    width:100%;margin-top:.55em;border:1.5px dashed var(--line);background:transparent;color:var(--ink-soft);
    border-radius:.7em;padding:.55em;font:inherit;font-size:.9em;cursor:pointer;
  }
  .note-show:hover{border-color:var(--accent);color:var(--accent)}
  .calc-act{
    border:none;border-radius:.7em;padding:.6em .2em;font:inherit;font-size:.9em;font-weight:600;cursor:pointer;
    background:#f3ece2;color:var(--ink);box-shadow:var(--shadow);white-space:nowrap;transition:.1s;
  }
  .calc-act:hover{background:var(--accent-soft);color:var(--accent)}
  .calc-act:active{transform:scale(.95)}
  .calc-act.ok{background:var(--accent);color:#fff}
  .calc-tape{margin-top:.55em;border-top:1px dashed var(--line);padding-top:.5em}
  .calc-tape-head{display:flex;align-items:center;gap:.4em;margin-bottom:.4em;font-size:.95em}
  .calc-tape-head .ttl{flex:1;font-weight:700;color:var(--ink-soft)}
  .calc-tape-list{max-height:9em;overflow:auto;display:flex;flex-direction:column;gap:.25em}
  .tape-row{display:flex;align-items:center;gap:.4em;font-size:.95em;font-variant-numeric:tabular-nums}
  .tape-row .tnote{flex:1;text-align:left;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-variant-numeric:normal}
  .tape-row .tv{white-space:nowrap}
  .tape-x{border:none;background:transparent;color:#cbb7ad;cursor:pointer;font-size:.85em;padding:.1em .35em;border-radius:.4em}
  .tape-x:hover{background:#ffe2e2;color:var(--danger)}
  .tape-total{display:flex;align-items:center;gap:.4em;margin-top:.45em;padding-top:.4em;border-top:1px solid var(--line);font-weight:700}
  .tape-total .lbl{color:var(--ink-soft);font-weight:500}
  .tape-total .tt{flex:1;text-align:right;color:var(--accent);font-size:1.1em;font-variant-numeric:tabular-nums}
  .mini-toast{
    position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(8px);
    background:var(--ink);color:#fff;font-size:13.5px;padding:9px 16px;border-radius:12px;
    box-shadow:0 8px 24px rgba(0,0,0,.25);opacity:0;transition:.25s;z-index:300;pointer-events:none;
  }
  .mini-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:480px){
    .wrap{padding:16px 8px 70px}
    .bm{max-width:150px}
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- ===== HOME ===== -->
  <section id="homeView">
    <header class="app">
      <div class="mark">
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-label="頭腦備份站">
          <path d="M11 21a13 13 0 0 1 26 0v11q0 2-1.6 2-1.2 0-2-1.4-0.8-1.4-2-1.4t-2 1.4q-0.8 1.4-2 1.4t-2-1.4q-0.8-1.4-2-1.4t-2 1.4q-0.8 1.4-2 1.4t-2-1.4q-0.8-1.4-2-1.4-1.2 0-2 1.4-0.8 1.4-2 1.4Q11 34 11 32Z" fill="#fff5ef" stroke="#e07a64" stroke-width="2" stroke-linejoin="round"/>
          <circle class="eye" cx="19" cy="22" r="1.8" fill="#5b4a44"/>

<script>
(function(){

  var PINNED_2_SHEET = "https://docs.google.com/spreadsheets/d/1XMwpdQ1D8ENk7aA5BHTDVlNlkoSTR4KnKIDvsqnhyfI/edit?usp=sharing";

  /* 第一個主題的「內建快照」：沒登入時先顯示這份，登入後自動換成最新即時資料 */
  var PINNED_FIRST_SEED = [
    ["内部 三方","内部 金额","外部 三方","外部 金额"],
    ["JJ卡转卡","8320.322","JJ卡转卡","55522.637"],
    ["JJ支付宝","26908.643","JJ支付宝","15346.649"],

    ["红喜鹊支转支","0.00","",""],
    ["ZCPAY支付宝","2110.455","ZCPAY支付宝","0.000"],
    ["码上支付宝（新人层）","7395.810","",""],
    ["码上纯代收","0.000","",""],
    ["码上小额卡卡","481.000","",""],
    ["新宝支付宝","3403.922","新宝支付宝","487.974"],
    ["新宝支付宝(小额)","0.000","",""],
    ["新宝银联","0.000","",""],
    ["和奕","4513.000","和奕","7644.000"],
    ["和奕支付宝","5850.818","",""],
    ["全通支付宝","2959.020","全通支付宝","12039.150"],
    ["GOSM支付宝","4261.868","",""],
    ["GOSM微信","488.070","",""],
    ["乐支付宝","1336.525","",""],
    ["onepay数字人民币","0.000","",""],
    ["onepay银联扫码","0.000","",""],
    ["onepay小荷包","0.000","",""],
    ["宝诺原生支付宝H5","0.000","",""],
    ["HCPAY","0.000","",""],
    ["XPAY支付宝","0.000","",""]
  ];

  /* ===== 你的 Google OAuth 設定（私人試算表連動用）=====
     1) 去 Google Cloud Console 啟用「Google Sheets API」
     2) 建立「OAuth 用戶端 ID（網頁應用程式）」，把你的 GitHub Pages 網址加進
        「已授權的 JavaScript 來源」
     3) 把產生的用戶端 ID 貼到下面這行（...apps.googleusercontent.com）
  ===================================================== */
  var GOOGLE_CLIENT_ID = "460796542989-qlpqr0sjm4h492d49k3h7qikbre3ep4c.apps.googleusercontent.com";   // ← 貼這裡
  var GOOGLE_SCOPES = "https://www.googleapis.com/auth/spreadsheets.readonly";
  var gToken = null, gTokenClient = null, pendingAfterAuth = null;
  var gTokenAt = 0;                 // 取得 token 的時間（用來判斷快過期）
  var AUTO_REFRESH_MS = 5*60*1000;  // 連動表自動重新整理間隔（5 分鐘）
  var autoRefreshTimer = null;      // 目前連動主題的自動刷新計時器

  var state = load();
  var view = "home";          // "home" | "topic"
  var curTopic = null;        // topic id
  var modalMode = "add";      // "add" | "edit"
  var modalColor = COLORS[0];
  var modalIcon = ICONS[0];
  var editingItemId = null;
  var pendingDelItem = null;  // item id awaiting 2nd-tap confirm
  var pendingDelTopic = false;
  var sheetSync = {};         // topicId -> {loading, error} (transient, not saved)
  var sheetFilters = {};      // topicId -> 篩選關鍵字 (transient)

  /* ---------- storage ---------- */
  function load(){
    try{
      var raw = localStorage.getItem(KEY);
      if(raw){
        var d = JSON.parse(raw);
        if(d && Array.isArray(d.topics)){
          d.topics.forEach(function(t){
            if(!Array.isArray(t.items)) t.items = [];
            if(!t.icon) t.icon = ICONS[0];
            if(!t.color) t.color = COLORS[0];
          });
          if(PINNED_FIRST_SHEET && d.topics[0]) d.topics[0].sheetUrl = PINNED_FIRST_SHEET;
          if(PINNED_FIRST_NAME && d.topics[0]) d.topics[0].name = PINNED_FIRST_NAME;
          if(PINNED_2_NAME && PINNED_2_SHEET){
            var t2=null;
            for(var qi=0;qi<d.topics.length;qi++){ if(d.topics[qi].name===PINNED_2_NAME){ t2=d.topics[qi]; break; } }
            if(!t2){ t2={ id:uid(), name:PINNED_2_NAME, color:COLORS[3], icon:"📒", items:[] }; d.topics.push(t2); }
            t2.sheetUrl=PINNED_2_SHEET;
          }
          if(PINNED_FIRST_SEED && d.topics[0] && (!d.topics[0].sheetCache || d.topics[0].sheetCache.seed)){
            d.topics[0].sheetCache = { rows: PINNED_FIRST_SEED, at: Date.now(), seed: true };
          }
          return d;
        }
      }
    }catch(e){}
    return { topics: [] };
  }
  function save(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){} }
  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
  function topicById(id){ for(var i=0;i<state.topics.length;i++){ if(state.topics[i].id===id) return state.topics[i]; } return null; }

  /* ---------- helpers ---------- */
  var $ = function(id){ return document.getElementById(id); };
  function esc(s){ return String(s).replace(/[&<>"']/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
  function tint(hex){
    var h=hex.replace('#',''); if(h.length===3){h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];}
    var r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
    return 'rgba('+r+','+g+','+b+',0.18)';
  }

  /* ---------- render: home ---------- */
  function renderHome(){
    // 自動選取（沒選或選的已不存在時，選第一個）
    if(state.topics.length && !topicById(curTopic)) curTopic = state.topics[0].id;
    if(!state.topics.length) curTopic = null;

    var grid = $("topicGrid"), html = "";
    state.topics.forEach(function(t){
      var undone = t.items.filter(function(i){return !i.done;}).length;
      var badge = undone>0 ? '<span class="badge">'+undone+'</span>' : '';
      var sel = t.id===curTopic ? ' sel' : '';
      html += '<button class="bm'+sel+'" data-id="'+t.id+'" style="--tag:'+tint(t.color)+'">'
            +   '<span class="ic">'+esc(t.icon)+'</span>'
            +   '<span class="lbl">'+esc(t.name)+'</span>'
            +   badge
            + '</button>';
    });
    html += '<button class="bm-add" id="addTopicCard"><span class="plus">＋</span>新增</button>';
    grid.innerHTML = html;

    var has = state.topics.length>0;
    $("homeEmpty").classList.toggle("hidden", has);
    $("panel").classList.toggle("hidden", !has);

    Array.prototype.forEach.call(grid.querySelectorAll(".bm"), function(el){
      el.addEventListener("click", function(){ selectTopic(el.getAttribute("data-id")); });
    });
    $("addTopicCard").addEventListener("click", function(){ openTopicModal("add"); });

    if(has) renderTopic();
  }

  /* ---------- select a bookmark (inline) ---------- */
  function selectTopic(id){
    if(curTopic===id) return;
    curTopic = id; pendingDelItem = null;
    try{ localStorage.setItem(LASTKEY, id); }catch(e){}
    $("newItemInput").value = ""; $("addItemBtn").disabled = true;
    renderHome();
    maybeSync(id);
    setupAutoRefresh(id);
  }
  // 打開連動主題時自動抓最新（沒抓過、或上次抓超過30秒就更新）
  function maybeSync(id){
    var t=topicById(id);
    if(!t || !t.sheetUrl) return;
    var fresh = t.sheetCache && (Date.now()-t.sheetCache.at < 30000);
    if(!fresh) syncSheet(id);
  }
  // 目前看的連動主題每隔幾分鐘自動刷新一次
  function setupAutoRefresh(id){
    if(autoRefreshTimer){ clearInterval(autoRefreshTimer); autoRefreshTimer=null; }
    var t=topicById(id);
    if(!t || !t.sheetUrl) return;
    autoRefreshTimer = setInterval(function(){
      if(curTopic===id && document.visibilityState!=="hidden") syncSheet(id);
    }, AUTO_REFRESH_MS);
  }

  /* ---------- render: panel content ---------- */
  function renderTopic(){
    var t = topicById(curTopic);
    if(!t){ return; }
    $("topicName").textContent = t.name;
    $("topicDot").textContent = t.icon;
    $("topicDot").style.background = tint(t.color);
    renderSheetBlock(t);

    var list = $("itemList"), html = "";
    t.items.forEach(function(it){
      var del = pendingDelItem === it.id;
      if(it.type==="file"){
        var thumb = (it.mime && it.mime.indexOf("image/")===0 && it.data)
          ? '<img src="'+it.data+'" alt="">'
          : fileIcon(it.name, it.mime);
        html += '<div class="item file'+(it.done?' done':'')+'" data-id="'+it.id+'">'
          +  '<div class="check'+(it.done?' on':'')+'" data-act="toggle" data-id="'+it.id+'">'
          +    '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>'
          +  '<div class="fic">'+thumb+'</div>'
          +  '<div class="item-body">'
          +    '<div class="item-title">'+esc(it.name)+'</div>'
          +    '<div class="item-size">'+humanSize(it.size)+(it.note?' · '+esc(it.note):'')+'</div>'
          +  '</div>'
          +  '<div class="item-actions">'
          +    '<button class="icon-btn" data-act="open" data-id="'+it.id+'">開啟</button>'
          +    '<button class="icon-btn del'+(del?' confirm':'')+'" data-act="del" data-id="'+it.id+'">'
          +       (del?'確定刪除':'刪除')+'</button>'
          +  '</div>'
          + '</div>';
      }else{
        html += '<div class="item'+(it.done?' done':'')+'" data-id="'+it.id+'">'
          +  '<div class="check'+(it.done?' on':'')+'" data-act="toggle" data-id="'+it.id+'">'
          +    '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>'
          +  '<div class="item-body">'
          +    '<div class="item-title">'+esc(it.title)+'</div>'
          +    (it.note ? '<div class="item-note">'+esc(it.note)+'</div>' : '')
          +  '</div>'
          +  '<div class="item-actions">'
          +    '<button class="icon-btn" data-act="edit" data-id="'+it.id+'">編輯</button>'
          +    '<button class="icon-btn del'+(del?' confirm':'')+'" data-act="del" data-id="'+it.id+'">'
          +       (del?'確定刪除':'刪除')+'</button>'
          +  '</div>'
          + '</div>';
      }
    });
    list.innerHTML = html;
    $("itemEmpty").classList.toggle("hidden", t.items.length>0);

    Array.prototype.forEach.call(list.querySelectorAll("[data-act]"), function(el){
      el.addEventListener("click", function(){
        var act = el.getAttribute("data-act"), id = el.getAttribute("data-id");
        if(act==="toggle") toggleItem(id);
        else if(act==="edit") openItemModal(id);
        else if(act==="open") openFile(id);
        else if(act==="del") delItem(id);
      });
    });

  /* ---------- google auth (OAuth, 私人讀取) ---------- */
  function gReady(){ return (typeof google!=="undefined") && google.accounts && google.accounts.oauth2; }
  function ensureTokenClient(){
    if(gTokenClient) return gTokenClient;
    if(!GOOGLE_CLIENT_ID || !gReady()) return null;
    gTokenClient = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: GOOGLE_SCOPES,
      callback: function(resp){
        if(resp && resp.access_token){
          gToken = resp.access_token;
          gTokenAt = Date.now();
          try{ localStorage.setItem("gConnected","1"); }catch(e){}
          updateAuthBtn();
          var f = pendingAfterAuth; pendingAfterAuth = null;
          if(f) f();
        }
      }
    });
    return gTokenClient;
  }
  // token 約 1 小時過期；快過期就在背景靜默換新，不跳視窗
  function ensureFreshToken(cb){
    var fresh = gToken && (Date.now()-gTokenAt < 50*60*1000);
    if(fresh){ cb(); return; }
    if(!GOOGLE_CLIENT_ID || !gReady()){ cb(); return; }
    var tc = ensureTokenClient();
    if(!tc){ cb(); return; }
    pendingAfterAuth = cb;
    tc.requestAccessToken({ prompt: "" });   // 靜默續授權
  }
  function gConnect(){
    if(!GOOGLE_CLIENT_ID){ alert("還沒設定 Google 用戶端 ID。\n請先在程式碼最上面的 GOOGLE_CLIENT_ID 填入你的 OAuth 用戶端 ID。"); return; }
    var tc = ensureTokenClient();
    if(!tc){ alert("Google 登入元件還在載入，請稍候一兩秒再試。"); return; }
    tc.requestAccessToken({ prompt: gToken ? "" : "" });
  }
  function gSignOut(){
    if(gToken && gReady()){ try{ google.accounts.oauth2.revoke(gToken, function(){}); }catch(e){} }
    gToken = null; try{ localStorage.removeItem("gConnected"); }catch(e){}
    updateAuthBtn(); renderHome();
  }
  function updateAuthBtn(){
    var b=$("gAuthBtn"); if(!b) return;
    if(gToken){ b.textContent="✓ Google"; b.title="已連結，點此登出"; }
    else { b.textContent="連結 Google"; b.title="登入以讀取私人試算表"; }
  }

  /* ---------- google sheet sync (dispatch) ---------- */
  function parseSheetRef(u){
    var m=(u||"").match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
    if(!m) return null;
    var gid=0, g=(u||"").match(/[#&?]gid=([0-9]+)/);
    if(g) gid=parseInt(g[1],10);
    return { id:m[1], gid:gid };
  }
  function isGoogleSheet(u){ return /\/spreadsheets\/d\//.test(u||"") && !/output=csv/i.test(u||""); }
  function syncSheet(id){
    var t=topicById(id);
    if(!t || !t.sheetUrl) return;
    if(isGoogleSheet(t.sheetUrl)) syncViaApi(id);
    else syncViaCsv(id);
  }
  function handle401(r){
    if(r.status===401) throw new Error("__401__");
    if(!r.ok){ return r.json().then(function(j){ throw new Error((j.error&&j.error.message)||("HTTP "+r.status)); },
                                   function(){ throw new Error("HTTP "+r.status); }); }
    return r.json();
  }
  function friendlyApiErr(e){
    var m=(e&&e.message)||"";
    if(/not been used|disabled|SERVICE_DISABLED|API .* not enabled/i.test(m)) return "請先在 Google Cloud 啟用「Google Sheets API」。";
    if(/PERMISSION_DENIED|permission/i.test(m)) return "這個 Google 帳號沒有這份試算表的存取權。";
    if(/NOT_FOUND|Requested entity/i.test(m)) return "找不到這份試算表，請確認連結正確。";
    return "讀取失敗："+m;
  }
  function syncViaApi(id){
    var t=topicById(id), ref=parseSheetRef(t.sheetUrl);
    if(!ref){ sheetSync[id]={loading:false,error:"連結看不出試算表 ID。"}; if(curTopic===id) renderSheetBlock(t); return; }
    if(!gToken){ sheetSync[id]={loading:false,error:"__NEEDLOGIN__"}; if(curTopic===id) renderSheetBlock(t); return; }
    sheetSync[id]={loading:true,error:""}; if(curTopic===id) renderSheetBlock(t);
    ensureFreshToken(function(){
      var base="https://sheets.googleapis.com/v4/spreadsheets/"+ref.id;
      var hdr={ headers:{ Authorization:"Bearer "+gToken } };
      fetch(base+"?fields=sheets(properties(sheetId,title))", hdr).then(handle401).then(function(meta){
        var title=null;
        (meta.sheets||[]).forEach(function(s){ if(s.properties.sheetId===ref.gid) title=s.properties.title; });
        if(!title && meta.sheets && meta.sheets[0]) title=meta.sheets[0].properties.title;
        if(!title) throw new Error("NOT_FOUND");
        return fetch(base+"/values/"+encodeURIComponent(title)+"?majorDimension=ROWS", hdr).then(handle401);
      }).then(function(vals){
        t.sheetCache={ rows:(vals.values||[]), at:Date.now() };
        sheetSync[id]={loading:false,error:""};
        try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){}
        if(curTopic===id) renderSheetBlock(t);
      }).catch(function(e){
        if(e && e.message==="__401__"){ pendingAfterAuth=function(){ syncViaApi(id); }; gConnect(); return; }
        sheetSync[id]={loading:false, error:friendlyApiErr(e)};
        if(curTopic===id) renderSheetBlock(t);
      });
    });
  }

  /* ---------- google sheet sync (public CSV / apps script) ---------- */
  function normalizeSheetUrl(u){
    u = (u||"").trim();
    if(!u) return "";
    if(/output=csv/i.test(u)) return u;                 // 已是 CSV（發布到網路）
    var m = u.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
    if(!m) return u;                                    // 非標準連結，原樣丟給 fetch
    var id = m[1];
    var gid = "";
    var g = u.match(/[#&?]gid=([0-9]+)/);
    if(g) gid = g[1];
    return "https://docs.google.com/spreadsheets/d/"+id+"/gviz/tq?tqx=out:csv"+(gid?("&gid="+gid):"");
  }
  function parseCSV(text){
    var rows=[], row=[], cur="", i=0, inQ=false, c;
    while(i<text.length){
      c=text[i];
      if(inQ){
        if(c==='"'){ if(text[i+1]==='"'){ cur+='"'; i++; } else inQ=false; }
        else cur+=c;
      }else{
        if(c==='"') inQ=true;
        else if(c===','){ row.push(cur); cur=""; }
        else if(c==='\n'){ row.push(cur); rows.push(row); row=[]; cur=""; }
        else if(c==='\r'){ /* skip */ }
        else cur+=c;
      }
      i++;
    }
    if(cur.length||row.length){ row.push(cur); rows.push(row); }
    return rows.filter(function(r){ return r.some(function(x){return x!=="";}); });
  }
  function renderTable(rows, filter){
    var MAX=1000;
    var head=rows[0]||[];
    var body=rows.slice(1);
    var q=(filter||"").trim().toLowerCase();
    if(q){
      body=body.filter(function(r){
        return r.some(function(x){ return String(x==null?"":x).toLowerCase().indexOf(q)>-1; });
      });
    }
    var totalData=rows.length>0?rows.length-1:0;
    var shownBody=body.slice(0,MAX);
    var cols=0; [head].concat(shownBody).forEach(function(r){ if(r.length>cols) cols=r.length; });
    // 哪些欄要加複製鈕：金額、三方、商戶名（掃描前兩列表頭，兼容合併標題）
    var copyCol={};
    var hdrRows=[rows[0]||[], rows[1]||[]];
    for(var c=0;c<cols;c++){
      for(var hr=0;hr<hdrRows.length;hr++){
        var hd=String(hdrRows[hr][c]!=null?hdrRows[hr][c]:"");
        if(/金[额額]/.test(hd) || /三方/.test(hd) || /商[户戶]|名[称稱]/.test(hd)){ copyCol[c]=true; break; }
      }
    }
    var h='<div class="sheet-scroll"><table class="sheet-tbl"><thead><tr>';
    for(var k=0;k<cols;k++){
      var ht=String(head[k]!=null?head[k]:"");
      var thc = /[内內]部/.test(ht) ? ' class="g-in"' : (/外部/.test(ht) ? ' class="g-out"' : '');
      h+='<th'+thc+'>'+esc(ht)+'</th>';
    }
    h+='</tr></thead><tbody>';
    for(var r=0;r<shownBody.length;r++){
      h+='<tr>';
      for(var k2=0;k2<cols;k2++){
        var val=shownBody[r][k2]!=null?shownBody[r][k2]:"";
        var sv=String(val).trim();
        if(copyCol[k2] && sv!==""){
          h+='<td class="amt"><span>'+esc(val)+'</span>'
           + '<button type="button" class="copy-btn" data-copy="'+esc(val)+'" title="複製">📋</button></td>';
        }else if(/^(✓|✔|√|v|是|ok|有|開啟|开启)$/i.test(sv)){
          h+='<td><span class="st-yes">✓</span></td>';
        }else if(/^(✗|✘|×|x|╳|否|無|无|關閉|关闭)$/i.test(sv)){
          h+='<td><span class="st-no">✕</span></td>';
        }else{
          h+='<td>'+esc(val)+'</td>';
        }
      }
      h+='</tr>';
    }
    h+='</tbody></table></div>';
    if(q) h+='<div class="sheet-more">符合「'+esc(filter.trim())+'」：'+body.length+' / '+totalData+' 列'+(body.length>MAX?'（顯示前 '+MAX+'）':'')+'</div>';
    else if(totalData>MAX) h+='<div class="sheet-more">僅顯示前 '+MAX+' 列，共 '+totalData+' 列。</div>';
    return h;
  }
  function clockStr(ts){
    var d=new Date(ts), p=function(n){return(n<10?"0":"")+n;};
    return p(d.getHours())+":"+p(d.getMinutes());
  }
  function fallbackCopy(txt){
    var ta=document.createElement("textarea");
    ta.value=txt; ta.style.position="fixed"; ta.style.top="-1000px"; ta.style.opacity="0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    try{ document.execCommand("copy"); }catch(e){}
    document.body.removeChild(ta);
  }
  function copyText(txt, btn){
    var orig = btn ? btn.textContent : null;
    function done(){
      if(!btn) return;
      btn.classList.add("copied"); btn.textContent="✓";
      setTimeout(function(){ btn.classList.remove("copied"); btn.textContent=orig; }, 1000);
    }
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(txt).then(done, function(){ fallbackCopy(txt); done(); });
    }else{ fallbackCopy(txt); done(); }
  }
  function onCopyClick(e){
    var b=e.target.closest ? e.target.closest(".copy-btn") : null;
    if(!b) return;
    e.stopPropagation();
    copyText(b.getAttribute("data-copy")||"", b);
  }
  function renderSheetBlock(t){
    var box=$("sheetBlock");
    if(!t || !t.sheetUrl){ box.classList.add("hidden"); box.innerHTML=""; return; }
    box.classList.remove("hidden");
    var st=sheetSync[t.id]||{};
    var meta = st.loading ? "更新中…"
             : (t.sheetCache && t.sheetCache.seed ? "內建快照 · 登入後更新"
             : (t.sheetCache ? ("上次更新 "+clockStr(t.sheetCache.at)) : "尚未讀取"));
    var hasData = t.sheetCache && t.sheetCache.rows && t.sheetCache.rows.length;
    var fval = sheetFilters[t.id]||"";
    var h='<div class="sheet-bar"><span class="sheet-title">📊 連動試算表</span>'
        + '<span class="sheet-meta">'+meta+'</span>'
        + '<button class="mini-btn" id="sheetRefresh"'+(st.loading?" disabled":"")+'>重新整理</button></div>';
    if(hasData){
      h+='<div class="sheet-search"><span class="ss-ic">🔍</span>'
       + '<input id="sheetFilter" type="text" placeholder="關鍵字篩選…" value="'+esc(fval)+'">'
       + (fval?'<button class="ss-clear" id="sheetFilterClear" title="清除">✕</button>':'')
       + '</div>';
      h+='<div id="sheetTableWrap">'+renderTable(t.sheetCache.rows, fval)+'</div>';
    }
    if(st.error==="__NEEDLOGIN__"){
      h+='<div class="sheet-empty">這份是私人試算表，請先登入 Google 才能讀取。<br>'
       + '<button class="mini-btn" id="sheetLogin" style="margin-top:8px">用 Google 登入讀取</button></div>';
    }else if(st.error){
      h+='<div class="sheet-err">'+esc(st.error)+'</div>';
    }else if(!t.sheetCache && !st.loading){
      h+='<div class="sheet-empty">按「重新整理」讀取試算表內容。</div>';
    }else if(!t.sheetCache && st.loading){
      h+='<div class="sheet-empty">讀取中…</div>';
    }
    box.innerHTML=h;
    var rb=$("sheetRefresh");
    if(rb) rb.addEventListener("click", function(){ syncSheet(t.id); });
    var lb=$("sheetLogin");
    if(lb) lb.addEventListener("click", function(){ pendingAfterAuth=function(){ syncSheet(t.id); }; gConnect(); });
    var fi=$("sheetFilter");
    if(fi) fi.addEventListener("input", function(){
      sheetFilters[t.id]=fi.value;
      var wrap=$("sheetTableWrap");
      if(wrap) wrap.innerHTML=renderTable(t.sheetCache.rows, fi.value);
      var cl=$("sheetFilterClear");
      if(fi.value && !cl){ renderSheetBlock(t); $("sheetFilter").focus();
        var el=$("sheetFilter"); el.setSelectionRange(el.value.length, el.value.length); }
      if(!fi.value && cl){ renderSheetBlock(t); $("sheetFilter").focus(); }
    });
    var wrapC=$("sheetTableWrap");
    if(wrapC) wrapC.addEventListener("click", onCopyClick);
    var fc=$("sheetFilterClear");
    if(fc) fc.addEventListener("click", function(){ sheetFilters[t.id]=""; renderSheetBlock(t); });
  }
  function syncViaCsv(id){
    var t=topicById(id);
    if(!t || !t.sheetUrl) return;
    sheetSync[id]={loading:true, error:""};
    if(curTopic===id) renderSheetBlock(t);
    var url=normalizeSheetUrl(t.sheetUrl);
    fetch(url, {cache:"no-store"}).then(function(res){
      if(!res.ok) throw new Error("HTTP "+res.status);
      return res.text();
    }).then(function(text){
      if(/<html/i.test(text)) throw new Error("page");
      var rows=parseCSV(text);
      t.sheetCache={rows:rows, at:Date.now()};
      sheetSync[id]={loading:false, error:""};
      try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){ /* 表太大就不快取 */ }
      if(curTopic===id) renderSheetBlock(t);
    }).catch(function(){
      sheetSync[id]={loading:false, error:"讀不到內容。請確認試算表已「發布到網路（CSV）」或共用設為『知道連結的任何人可檢視』。"};
      if(curTopic===id) renderSheetBlock(t);
    });
  }

  /* ---------- file helpers ---------- */
  function humanSize(b){
    if(b==null) return "";
    if(b<1024) return b+" B";
    if(b<1048576) return (b/1024).toFixed(1)+" KB";
    return (b/1048576).toFixed(1)+" MB";
  }
  function fileIcon(name, mime){
    var ext=(name||"").split(".").pop().toLowerCase();
    if(["xls","xlsx","xlsm","csv"].indexOf(ext)>-1) return "📊";
    if(["doc","docx"].indexOf(ext)>-1) return "📝";
    if(ext==="pdf") return "📕";
    if(["ppt","pptx","key"].indexOf(ext)>-1) return "📑";
    if(["zip","rar","7z"].indexOf(ext)>-1) return "🗜️";
    if(["txt","md","rtf"].indexOf(ext)>-1) return "📄";
    if(["mp3","wav","m4a"].indexOf(ext)>-1) return "🎵";
    if(["mp4","mov","avi"].indexOf(ext)>-1) return "🎬";
    if(mime && mime.indexOf("image/")===0) return "🖼️";
    return "📎";
  }
  function openFile(id){
    var t=topicById(curTopic), it=null;
    t.items.forEach(function(i){ if(i.id===id) it=i; });
    if(!it||!it.data) return;
    var a=document.createElement("a");
    a.href=it.data; a.download=it.name;
    document.body.appendChild(a); a.click(); a.remove();
  }
  function addFiles(fileList){
    var files=Array.prototype.slice.call(fileList||[]);
    if(!files.length) return;
    var t=topicById(curTopic);
    var i=0;
    (function next(){
      if(i>=files.length){ blinkGhost(); renderHome(); return; }
      var f=files[i++];
      if(f.size > 4*1024*1024){
        alert("「"+f.name+"」太大了（"+humanSize(f.size)+"）。\n本機儲存建議單檔小於 4MB，這個先略過。");
        next(); return;
      }
      var r=new FileReader();
      r.onload=function(){
        var item={ id:uid(), type:"file", name:f.name, mime:f.type||"", size:f.size, data:r.result, note:"", done:false };
        t.items.push(item);
        try{
          localStorage.setItem(KEY, JSON.stringify(state));
        }catch(e){
          t.items.pop();
          alert("本機空間不足，無法存入「"+f.name+"」。\n可先刪掉一些舊檔案或大檔再試。");
          blinkGhost(); renderHome(); return;
        }
        next();
      };
      r.onerror=function(){ next(); };
      r.readAsDataURL(f);
    })();
  }

  /* ---------- export / import ---------- */
  function doExport(){
    var blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
    var url=URL.createObjectURL(blob), a=document.createElement("a");
    var d=new Date(), pad=function(n){return(n<10?"0":"")+n;};
    a.href=url; a.download="事項簿備份_"+d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+".json";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
  function doImport(file){
    var r=new FileReader();
    r.onload=function(){
      try{
        var d=JSON.parse(r.result);
        if(d && Array.isArray(d.topics)){
          d.topics.forEach(function(t){
            if(!Array.isArray(t.items)) t.items=[];
            if(!t.icon) t.icon=ICONS[0];
            if(!t.color) t.color=COLORS[0];
          });
          state=d; curTopic=null; save(); renderHome();
        }
        else alert("檔案格式不符，無法匯入。");
      }catch(e){ alert("讀取失敗，請確認是匯出的 JSON 檔。"); }
    };
    r.readAsText(file);
  }

  /* ---------- 小計算機 ---------- */
  var calc = { now:"0", acc:null, op:null, waiting:false, expr:"" };
  function calcRender(){
    var n=$("calcNow"), x=$("calcExpr");
    if(n) n.textContent = calc.now;
    if(x) x.textContent = calc.expr;
  }
  function calcFmt(n){
    if(!isFinite(n)) return "Error";
    return String(Math.round((n+Number.EPSILON)*1e10)/1e10);
  }
  function calcSym(op){ return op==="*"?"×":op==="/"?"÷":op==="-"?"−":"＋"; }
  function calcApply(a,op,b){
    switch(op){ case "+":return a+b; case "-":return a-b; case "*":return a*b; case "/":return b===0?NaN:a/b; }
    return b;
  }
  function calcKey(k){
    if(/^[0-9]$/.test(k)){
      if(calc.waiting){ calc.now=k; calc.waiting=false; }
      else calc.now = (calc.now==="0") ? k : calc.now+k;
    }else if(k==="."){
      if(calc.waiting){ calc.now="0."; calc.waiting=false; }
      else if(calc.now.indexOf(".")===-1) calc.now+=".";
    }else if(k==="+"||k==="-"||k==="*"||k==="/"){
      var cur=parseFloat(calc.now);
      if(calc.op!==null && !calc.waiting){ calc.acc=calcApply(calc.acc, calc.op, cur); calc.now=calcFmt(calc.acc); }
      else calc.acc=cur;
      calc.op=k; calc.waiting=true;
      calc.expr=calcFmt(calc.acc)+" "+calcSym(k);
    }else if(k==="="){
      if(calc.op===null) return;
      var c2=parseFloat(calc.now);
      calc.expr=calcFmt(calc.acc)+" "+calcSym(calc.op)+" "+calcFmt(c2)+" =";
      calc.acc=calcApply(calc.acc, calc.op, c2); calc.now=calcFmt(calc.acc);
      calc.op=null; calc.waiting=true;
    }else if(k==="C"){
      calc.now="0"; calc.acc=null; calc.op=null; calc.waiting=false; calc.expr="";
    }else if(k==="back"){
      if(!calc.waiting){ calc.now = calc.now.length>1 ? calc.now.slice(0,-1) : "0"; if(calc.now==="-"||calc.now==="") calc.now="0"; }
    }else if(k==="%"){
      var p=parseFloat(calc.now);
      calc.now = (calc.op!==null && calc.acc!=null) ? calcFmt(calc.acc*p/100) : calcFmt(p/100);
    }else if(k==="copy"){
      var cb=document.querySelector(".calc-key.copy");
      copyText(calc.now, cb);
      return;
    }
    calcRender();
  }
  var calcScale = 13;
  function applyCalcScale(){ var p=$("calcPanel"); if(p) p.style.fontSize=calcScale+"px"; }
  function calcZoom(dir){
    calcScale = Math.max(10, Math.min(24, calcScale + (dir==="in"?2:-2)));
    applyCalcScale();
    try{ localStorage.setItem("calcScale", String(calcScale)); }catch(e){}
  }
  function openCalc(){
    var p=$("calcPanel");
    p.classList.remove("hidden");
    calcRender();
  }
  function closeCalc(){ $("calcPanel").classList.add("hidden"); }

  /* ---------- 計算機進階：貼上 / 加總 / 存主題 ---------- */
  var tally = [];
  var noteOn = true;
  function applyNoteVis(){
    var row=$("calcNoteRow"), show=$("calcNoteShow");
    if(!row||!show) return;
    if(noteOn){ row.classList.remove("hidden"); show.classList.add("hidden"); }
    else { row.classList.add("hidden"); show.classList.remove("hidden"); var n=$("calcNote"); if(n) n.value=""; }
  }
  function setNoteOn(v){ noteOn=v; try{ localStorage.setItem("calcNoteOn", v?"1":"0"); }catch(e){} applyNoteVis(); }
  function loadTally(){
    try{
      var a=JSON.parse(localStorage.getItem("calcTally")||"[]");
      if(Array.isArray(a)) tally=a.map(function(x){
        return (x && typeof x==="object") ? {v:+x.v||0, note:String(x.note||"")} : {v:+x||0, note:""};
      });
    }catch(e){}
  }
  function saveTally(){ try{ localStorage.setItem("calcTally", JSON.stringify(tally)); }catch(e){} }
  function tallySum(){ var s=tally.reduce(function(a,b){return a+(+b.v||0);},0); return Math.round((s+Number.EPSILON)*1e10)/1e10; }
  function toast(msg){
    var el=document.createElement("div"); el.className="mini-toast"; el.textContent=msg;
    document.body.appendChild(el);
    requestAnimationFrame(function(){ el.classList.add("show"); });
    setTimeout(function(){ el.classList.remove("show"); setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); },300); }, 1400);
  }
  function renderTape(){
    var box=$("calcTape"); if(!box) return;
    if(!tally.length){ box.classList.add("hidden"); box.innerHTML=""; return; }
    box.classList.remove("hidden");
    var h='<div class="calc-tape-head"><span class="ttl">明細 '+tally.length+' 筆</span>'
        + '<button class="calc-mini" data-t="copyall">複製清單</button>'
        + '<button class="calc-mini" data-t="clear">清空</button></div>';
    h+='<div class="calc-tape-list">';
    tally.forEach(function(e,i){
      h+='<div class="tape-row"><span class="tnote">'+esc(e.note||"")+'</span>'
       + '<span class="tv">'+esc(String(e.v))+'</span>'
       + '<button class="tape-x" data-i="'+i+'" title="刪除">✕</button></div>';
    });
    h+='</div>';
    h+='<div class="tape-total"><span class="lbl">合計</span><span class="tt">'+esc(String(tallySum()))+'</span>'
     + '<button class="calc-mini" data-t="copytotal" title="複製合計">📋</button></div>';
    box.innerHTML=h;
  }
  function tallyAdd(){
    var v=parseFloat(calc.now);
    if(!isFinite(v)) return;
    var ne=$("calcNote"), note=(noteOn && ne)?ne.value.trim():"";
    tally.push({ v:Math.round((v+Number.EPSILON)*1e10)/1e10, note:note });
    if(ne) ne.value="";
    saveTally(); renderTape(); calc.waiting=true;
    toast("已記一筆，合計 "+tallySum());
  }
  function setCalcNum(s){
    var num=parseFloat(String(s).replace(/[^0-9.\-]/g,""));
    if(isFinite(num)){ calc.now=String(num); calc.waiting=false; calcRender(); return true; }
    return false;
  }
  function calcPaste(){
    if(navigator.clipboard && navigator.clipboard.readText){
      navigator.clipboard.readText().then(function(s){
        if(!setCalcNum(s)) toast("剪貼簿沒有可用的數字");
      }, function(){ toast("讀不到剪貼簿，請改用 Ctrl+V 貼上"); });
    }else toast("請改用 Ctrl+V 貼上");
  }
  function calcToItem(){
    if(!curTopic){ toast("先點一個主題"); return; }
    var t=topicById(curTopic);
    t.items.push({ id:uid(), type:"text", title:calc.now, note:"", done:false });
    save(); renderHome();
    toast("已存入「"+t.name+"」");
  }
  function initCalcUI(){
    try{ var s=parseInt(localStorage.getItem("calcScale"),10); if(s) calcScale=s; }catch(e){}
    applyCalcScale();
    // 還原上次位置
    try{
      var pos=JSON.parse(localStorage.getItem("calcPos")||"null");
      if(pos && typeof pos.left==="number"){
        var p=$("calcPanel"); p.style.left=pos.left+"px"; p.style.top=pos.top+"px"; p.style.right="auto";
      }
    }catch(e){}
    // 拖移
    var panel=$("calcPanel"), bar=$("calcBar"), dragging=false, dx=0, dy=0;
    bar.addEventListener("pointerdown", function(e){
      if(e.target.closest(".calc-mini")) return;
      dragging=true;
      var r=panel.getBoundingClientRect();
      dx=e.clientX-r.left; dy=e.clientY-r.top;
      panel.style.right="auto"; panel.style.left=r.left+"px"; panel.style.top=r.top+"px";
      try{ bar.setPointerCapture(e.pointerId); }catch(_){}
    });
    bar.addEventListener("pointermove", function(e){
      if(!dragging) return;
      var x=e.clientX-dx, y=e.clientY-dy;
      var maxX=window.innerWidth-panel.offsetWidth-4, maxY=window.innerHeight-panel.offsetHeight-4;
      x=Math.max(4,Math.min(x,maxX)); y=Math.max(4,Math.min(y,maxY));
      panel.style.left=x+"px"; panel.style.top=y+"px";
    });
    function endDrag(){
      if(!dragging) return; dragging=false;
      try{ localStorage.setItem("calcPos", JSON.stringify({left:parseInt(panel.style.left,10), top:parseInt(panel.style.top,10)})); }catch(e){}
    }
    bar.addEventListener("pointerup", endDrag);
    bar.addEventListener("pointercancel", endDrag);
  }

  /* ---------- events ---------- */
  $("editTopicBtn").addEventListener("click", function(){ openTopicModal("edit"); });
  $("topicCancel").addEventListener("click", closeTopicModal);
  $("topicSave").addEventListener("click", saveTopic);
  $("delTopicBtn").addEventListener("click", delTopic);
  $("topicInput").addEventListener("keydown", function(e){ if(e.key==="Enter") saveTopic(); });
  $("iconInput").addEventListener("input", function(){
    if($("iconInput").value.trim()){ modalIcon=""; markIcon(); }
  });

  $("addItemBtn").addEventListener("click", addItem);
  $("attachBtn").addEventListener("click", function(){ $("fileInput").click(); });
  $("fileInput").addEventListener("change", function(e){ addFiles(e.target.files); e.target.value=""; });
  $("newItemInput").addEventListener("input", function(){
    $("addItemBtn").disabled = $("newItemInput").value.trim()==="";
  });
  $("newItemInput").addEventListener("keydown", function(e){ if(e.key==="Enter") addItem(); });

  $("itemCancel").addEventListener("click", function(){ $("itemModal").classList.remove("show"); });
  $("itemSave").addEventListener("click", saveItem);

  $("exportBtn").addEventListener("click", doExport);
  $("importBtn").addEventListener("click", function(){ $("importFile").click(); });
  $("importFile").addEventListener("change", function(e){ if(e.target.files[0]) doImport(e.target.files[0]); e.target.value=""; });

  $("gAuthBtn").addEventListener("click", function(){
    if(gToken){ if(confirm("要登出 Google 嗎？")) gSignOut(); }
    else gConnect();
  });

  // 計算機
  $("calcBtn").addEventListener("click", openCalc);
  $("calcClose").addEventListener("click", closeCalc);
  document.querySelector(".calc-grid").addEventListener("click", function(e){
    var b=e.target.closest ? e.target.closest(".calc-key") : null;
    if(b) calcKey(b.getAttribute("data-k"));
  });
  $("calcBar").addEventListener("click", function(e){
    var z=e.target.closest ? e.target.closest("[data-z]") : null;
    if(z) calcZoom(z.getAttribute("data-z"));
  });
  document.querySelector(".calc-actions").addEventListener("click", function(e){
    var b=e.target.closest ? e.target.closest("[data-a]") : null;
    if(!b) return;
    var a=b.getAttribute("data-a");
    if(a==="paste") calcPaste();
    else if(a==="tally") tallyAdd();
    else if(a==="toItem") calcToItem();
  });
  $("calcTape").addEventListener("click", function(e){
    var x=e.target.closest ? e.target.closest(".tape-x") : null;
    if(x){ tally.splice(parseInt(x.getAttribute("data-i"),10),1); saveTally(); renderTape(); return; }
    var t=e.target.closest ? e.target.closest("[data-t]") : null;
    if(!t) return;
    var a=t.getAttribute("data-t");
    if(a==="clear"){ tally=[]; saveTally(); renderTape(); }
    else if(a==="copytotal"){ copyText(String(tallySum()), t); }
    else if(a==="copyall"){ copyText(tally.map(function(e){ return e.note ? (e.note+"\t"+e.v) : String(e.v); }).join("\n"), t); }
  });
  loadTally(); renderTape();
  $("calcNoteHide").addEventListener("click", function(){ setNoteOn(false); });
  $("calcNoteShow").addEventListener("click", function(){ setNoteOn(true); var n=$("calcNote"); if(n) n.focus(); });
  try{ noteOn = localStorage.getItem("calcNoteOn")!=="0"; }catch(e){}
  applyNoteVis();
  // Ctrl+V / 長按貼上：把剪貼簿的數字貼進計算機
  document.addEventListener("paste", function(e){
    if($("calcPanel").classList.contains("hidden")) return;
    if(e.target && e.target.matches && e.target.matches("input,textarea")) return; // 備註欄正常貼上
    var cd=e.clipboardData||window.clipboardData;
    var txt=cd?cd.getData("text"):"";
    if(txt && setCalcNum(txt)){ e.preventDefault(); toast("已貼上 "+calc.now); }
  });
  initCalcUI();
  document.addEventListener("keydown", function(e){
    if($("calcPanel").classList.contains("hidden")) return;
    if(e.target && e.target.matches && e.target.matches("input,textarea")) return; // 打字時不攔截
    var k=e.key;
    if(e.ctrlKey || e.metaKey){            // Ctrl/⌘ 組合
      if(k==="c"||k==="C"){ e.preventDefault(); copyText(calc.now, document.querySelector(".calc-key.copy")); toast("已複製 "+calc.now); }
      return;                              // Ctrl+V 等交給瀏覽器/paste 事件
    }
    if(/^[0-9]$/.test(k)) calcKey(k);
    else if(k===".") calcKey(".");
    else if(k==="+"||k==="-"||k==="*"||k==="/") calcKey(k);
    else if(k==="Enter"||k==="="){ calcKey("="); }
    else if(k==="Backspace"){ calcKey("back"); }
    else if(k==="Escape"){ closeCalc(); }
    else if(k==="c"||k==="C"){ calcKey("C"); }
    else return;
    e.preventDefault();
  });

  // tap backdrop to close
  [$("topicModal"),$("itemModal")].forEach(function(ov){
    ov.addEventListener("click", function(e){ if(e.target===ov) ov.classList.remove("show"); });
  });

  updateAuthBtn();
  if(PINNED_FIRST_SHEET && state.topics[0]) save();   // 固定第一個主題的連動網址
  // 還原上次打開的主題，重開停在原處
  try{ var _last=localStorage.getItem(LASTKEY); if(_last && topicById(_last)) curTopic=_last; }catch(e){}
  renderHome();
  if(curTopic){ maybeSync(curTopic); setupAutoRefresh(curTopic); }

  // 切回此分頁時，順手刷新目前連動主題
  document.addEventListener("visibilitychange", function(){
    if(document.visibilityState==="visible" && curTopic){
      var t=topicById(curTopic);
      if(t && t.sheetUrl) syncSheet(curTopic);
    }
  });

  // 之前登入過就嘗試靜默取回授權（等 GIS 載入）
  if(GOOGLE_CLIENT_ID && localStorage.getItem("gConnected")){
    var _tries=0, _iv=setInterval(function(){
      _tries++;
      if(gReady()){ clearInterval(_iv); ensureTokenClient();
        pendingAfterAuth=function(){ if(curTopic){ var t=topicById(curTopic); if(t && t.sheetUrl) syncSheet(curTopic); } };
        gConnect();
      }
      else if(_tries>25){ clearInterval(_iv); }
    },200);
  }
})();
</script>
</body>
</html>
